<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>학습 노트</title>
  <script>
    // GitHub Pages는 SPA 라우팅을 모름 → 404.html로 떨어지면 index.html로 리다이렉트
    // 경로 정보를 쿼리스트링으로 인코딩해서 넘김 (index.html에서 복원)
    var pathSegmentsToKeep = 1; // 프로젝트 페이지 subpath 유지 (/study/)
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
