site_name: 학습 노트
site_url: https://krookimwoobin.github.io/study/
repo_url: https://github.com/KROOKIMWOOBIN/study
repo_name: KROOKIMWOOBIN/study
edit_uri: edit/main/docs/
docs_dir: docs
exclude_docs: |
  includes/*.md

theme:
  name: material
  language: ko
  font:
    text: Noto Sans KR
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tooltips
    - toc.follow

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid/dist/mermaid.min.js

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - abbr
  - footnotes
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.mark
  - pymdownx.snippets:
      base_path:
        - docs
      auto_append:
        - includes/abbreviations.md
  - tables

plugins:
  - search:
      lang: ko
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      locale: ko

