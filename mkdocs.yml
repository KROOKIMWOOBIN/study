site_name: 학습 노트
site_url: https://krookimwoobin.github.io/study/
repo_url: https://github.com/KROOKIMWOOBIN/study
repo_name: KROOKIMWOOBIN/study
edit_uri: edit/main/docs/
docs_dir: docs

theme:
  name: material
  language: ko
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow

plugins:
  - search:
      lang: ko
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      locale: ko

nav:
  - 홈: index.md
  - Java:
    - 개요: java/java.md
    - OOP:
      - 다형성: java/oop/다형성.md
      - 상속: java/oop/상속.md
      - 추상화: java/oop/추상화.md
      - 캡슐화: java/oop/캡슐화.md
    - 핵심 클래스 (중급 1편):
